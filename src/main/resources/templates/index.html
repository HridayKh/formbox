<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<a></a>
<script>
    const hash = window.location.hash.substring(1);
    if (hash) {
        fetch('/api/auth/handle-redirect', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: hash
        }).then(() => window.location.href = "/dashboard");
    }
</script>
</body>
</html>
