<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div id="create-form-container" class="p-6 bg-white rounded-lg shadow-sm">
    <h3 class="text-lg font-medium text-gray-900 mb-4">Create New Form Endpoint</h3>

    <form hx-post="/dashboard/forms"
          hx-target="#form-table-body"
          hx-swap="innerHTML"
          onhtmx:afterRequest="this.reset()">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Form Name</label>
                <input type="text" name="name" required placeholder="e.g., Contact Us Form"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Custom Redirect URL (Optional)</label>
                <input type="url" name="redirectUrl" placeholder="https://your-site.com/thanks"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <button type="submit"
                    class="inline-flex justify-center rounded-md border border-transparent bg-indigo-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-indigo-700">
                Create Endpoint
            </button>
        </div>
    </form>
</div>

<div class="mt-8 overflow-hidden shadow ring-1 ring-black ring-opacity-5 md:rounded-lg">
    <table class="min-w-full divide-y divide-gray-300">
        <thead class="bg-gray-50">
        <tr>
            <th class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Name</th>
            <th class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Endpoint URL</th>
            <th class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Status</th>
            <th class="relative py-3.5 pl-3 pr-4 sm:pr-6"></th>
        </tr>
        </thead>

        <tbody id="form-table-body" class="divide-y divide-gray-200 bg-white" th:fragment="form-rows">
        <tr th:each="form : ${forms}" th:id="'form-row-' + ${form.id}">
            <td class="whitespace-nowrap px-3 py-4 text-sm font-medium text-gray-900" th:text="${form.name}">Contact
            </td>
            <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">
                <code class="bg-gray-100 p-1 rounded text-xs" th:text="'/f/' + ${form.id}">/f/uuid</code>
            </td>
            <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">
                        <span th:class="${form.isActive} ? 'text-green-700 bg-green-50 px-2 py-1 rounded text-xs font-semibold' : 'text-red-700 bg-red-50 px-2 py-1 rounded text-xs font-semibold'"
                              th:text="${form.isActive} ? 'Active' : 'Inactive'">Active</span>
            </td>
            <td class="whitespace-nowrap py-4 pl-3 pr-4 text-right text-sm font-medium sm:pr-6">
                <button hx-trigger="click"
                        th:attr="hx-delete=|/dashboard/forms/${form.id}|, hx-target=|#form-row-${form.id}|"
                        hx-swap="outerHTML"
                        hx-confirm="Are you sure you want to delete this form?"
                        class="text-red-600 hover:text-red-900 font-semibold">
                    Delete
                </button>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(forms)}">
            <td colspan="4" class="px-3 py-8 text-center text-sm text-gray-500">
                No active form endpoints found. Create one above to get started!
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
