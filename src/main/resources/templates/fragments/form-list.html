<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<table>
    <tbody id="form-table-body" th:fragment="form-rows">
    <tr th:each="form : ${forms}" th:id="'form-row-' + ${form.id}">
        <td th:text="${form.name}" style="font-weight: 500;">Contact</td>

        <td>
            <code class="table__copy" th:text="'/f/' + ${form.id}">/f/uuid</code>
        </td>

        <td>
            <span th:class="${form.isActive} ? 'badge badge--active' : 'badge'"
                  th:text="${form.isActive} ? 'Active' : 'Inactive'">Active</span>
        </td>

        <td>
            <div class="table__actions" style="justify-content: flex-end;">
                <a class="btn btn--secondary btn--sm" th:href="@{/forms/{id}(id=${form.id})}">Manage</a>

                <button class="btn btn--danger btn--sm"
                        hx-trigger="click"
                        th:attr="hx-delete='/forms/${form.id}', hx-target='#form-row-${form.id}'"
                        hx-swap="outerHTML"
                        hx-confirm="Are you sure you want to delete this form?">
                    Delete
                </button>
            </div>
        </td>
    </tr>

    <tr th:if="${#lists.isEmpty(forms)}">
        <td colspan="4" style="text-align: center; padding: var(--space-8); color: var(--color-text-dim);">
            No active form endpoints found. Create one above to get started!
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
