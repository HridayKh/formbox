<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<!-- Fragment target element for table loading loops -->
<table>
    <tbody id="form-table-body" th:fragment="form-rows">
    <tr th:each="form : ${forms}" th:id="'form-row-' + ${form.id}">
        <td th:text="${form.name}">Contact</td>
        <td>
            <code th:text="'/f/' + ${form.id}">/f/uuid</code>
        </td>
        <td>
            <span th:text="${form.isActive} ? 'Active' : 'Inactive'">Active</span>
        </td>
        <td>
            <!-- Link to manage individual field settings -->
            <a th:href="@{/forms/{id}(id=${form.id})}" style="margin-right: 10px;">Manage</a>

            <button hx-trigger="click"
                    th:attr="hx-delete=|/forms/${form.id}|, hx-target=|#form-row-${form.id}|"
                    hx-swap="outerHTML"
                    hx-confirm="Are you sure you want to delete this form?">
                Delete
            </button>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(forms)}">
        <td colspan="4" style="text-align: center; padding: 2rem; color: #666;">
            No active form endpoints found. Create one above to get started!
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
