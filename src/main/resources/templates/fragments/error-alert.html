<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
    <strong class="font-bold" th:text="${errorTitle}">Error!</strong>
    <span class="block sm:inline" th:text="${errorMessage}">Something went wrong.</span>
    <span class="block sm:inline" th:text="${errorStatus}">Unknown status.</span>
</div>
