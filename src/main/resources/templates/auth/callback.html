<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verifying Session...</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
<div style="text-align: center; margin-top: 10%;">
    <h3>Finalizing verification, please wait...</h3>
</div>

<script>
    function getHashParams() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);

        return {
            access_token: params.get("access_token"),
            refresh_token: params.get("refresh_token"),
            expires_in: params.get("expires_in") || 3600
        };
    }

    window.addEventListener("DOMContentLoaded", () => {
        if (window.location.hash) {
            const tokens = getHashParams();

            // Programmatically execute the HTMX post without needing a dummy hidden button
            htmx.ajax('POST', '/auth/session-callback', {
                values: tokens
            });
        } else {
            window.location.href = "/auth/login";
        }
    });
</script>
</body>
</html>
