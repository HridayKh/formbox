<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | FormBox</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
<main class="auth-container">
    <h2>Login to FormBox</h2>

    <div id="alert-container">
        <div th:if="${param.msg != null and param.msg[0] == 'check_email'}" class="alert alert-success">
            Registration successful! Please check your email to confirm your account.
        </div>
        <div th:if="${param.msg != null and param.msg[0] == 'logged_out'}" class="alert alert-info">
            You have been safely logged out.
        </div>
        <div th:if="${param.msg != null and param.msg[0] == 'unauthorized'}" class="alert alert-danger">
            Please log in to access this resource.
        </div>
    </div>

    <!-- hx-target defaults to #alert-container for errors, but if your controller returns the 'empty' fragment, it triggers a client-side redirect -->
    <form hx-post="/auth/login" hx-target="#alert-container" hx-swap="innerHTML">
        <div>
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" required autocomplete="email"/>
        </div>
        <div>
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required autocomplete="current-password"/>
        </div>
        <button type="submit">Sign In</button>
    </form>

    <p>Don't have an account? <a href="/auth/signup">Register here</a></p>

    <!-- Correct fragment path structure matching ViewRegistry.Auth.Fragments -->
    <div th:replace="~{auth/fragments :: resend-form}"></div>
</main>
</body>
</html>
