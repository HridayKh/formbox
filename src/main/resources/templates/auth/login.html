<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | FormBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>

    <style>
        :root {
            --color-bg: #09090B;
            --color-bg-raised: #0E0E12;
            --color-surface: #121218;
            --color-surface-2: #16161D;
            --color-border: #1E1E24;
            --color-border-2: #27272A;
            --color-text: #F4F4F6;
            --color-text-dim: #A3A3AE;
            --color-text-faint: #6C6C77;
            --color-accent: #7C5CFC;
            --color-accent-bright: #9B7CFF;
            --gradient-accent: linear-gradient(135deg, #7C5CFC 0%, #5B3FE0 100%);
            --font-display: 'Inter', system-ui, -apple-system, sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-6: 24px;
            --space-8: 32px;
            --radius-md: 8px;
            --radius-lg: 14px;
            --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.02) inset, 0 12px 32px -16px rgba(0, 0, 0, 0.6);
            --shadow-glow-sm: 0 0 0 1px rgba(124, 92, 252, 0.45), 0 0 16px rgba(124, 92, 252, 0.25);
            --border-2: 1px solid var(--color-border-2);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-4);
        }

        .auth-container {
            background: var(--color-surface);
            border: var(--border-2);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            box-shadow: var(--shadow-card);
            width: 100%;
            max-width: 420px;
        }

        h2 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            margin-bottom: var(--space-6);
            text-align: center;
        }

        .form-block {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .form-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-text-faint);
        }

        .input {
            width: 100%;
            background: var(--color-bg-raised);
            color: var(--color-text);
            border: var(--border-2);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 0.92rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.18);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.92rem;
            padding: 12px 22px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        }

        .btn--primary {
            background: var(--gradient-accent);
            color: #FFFFFF;
            box-shadow: var(--shadow-glow-sm);
            width: 100%;
            margin-top: var(--space-2);
        }

        .btn--primary:hover {
            transform: translateY(-1px);
        }

        .btn--secondary {
            background: var(--color-surface-2);
            color: var(--color-text);
            border-color: var(--color-border-2);
        }

        .btn--secondary:hover {
            border-color: var(--color-accent);
            background: var(--color-surface);
        }

        .auth-footer {
            text-align: center;
            margin-top: var(--space-6);
            font-size: 0.9rem;
            color: var(--color-text-dim);
        }

        .auth-footer a {
            color: var(--color-accent-bright);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Alert definitions from fragments system */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.92rem;
            line-height: 1.5;
            margin-bottom: var(--space-4);
        }

        .alert--danger {
            background: rgba(243, 100, 100, 0.1);
            border: 1px solid #F36464;
            color: #F36464;
        }

        .alert--success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid #34D399;
            color: #34D399;
        }

        .alert--info {
            background: rgba(45, 216, 196, 0.1);
            border: 1px solid #2DD8C4;
            color: #2DD8C4;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--color-accent-bright);
            text-decoration: none;
            font-size: 0.92rem;
            margin-bottom: var(--space-6);
            transition: color 0.15s ease;
        }

        .back-link:hover {
            color: var(--color-accent);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

    </style>
</head>
<body>

<main class="auth-container">

    <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Home Page
    </a>

    <h2>Login to FormBox</h2>

    <div id="alert-container">
        <div th:if="${param.msg != null and param.msg[0] == 'check_email'}" class="alert alert--success">
            Registration successful! Please check your email to confirm your account.
        </div>
        <div th:if="${param.msg != null and param.msg[0] == 'logged_out'}" class="alert alert--info">
            You have been safely logged out.
        </div>
        <div th:if="${param.msg != null and param.msg[0] == 'unauthorized'}" class="alert alert--danger">
            Please log in to access this resource.
        </div>
    </div>

    <form hx-post="/auth/login" hx-target="#alert-container" hx-swap="innerHTML" class="form-block">
        <div class="form-group">
            <label for="login-email" class="form-label">Email</label>
            <input type="email" id="login-email" class="input" name="email" required autocomplete="email"/>
        </div>
        <div class="form-group">
            <label for="login-password" class="form-label">Password</label>
            <input type="password" id="login-password" class="input" name="password" required
                   autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn--primary">Sign In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="/auth/signup">Register here</a></p>

    <div th:replace="~{auth/fragments :: resend-form}"></div>
</main>

</body>
</html>
