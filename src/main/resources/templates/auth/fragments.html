<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <style th:fragment="auth-styles">
        /* Centralized Auth Styles injected via fragments or shared templates */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.92rem;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        .alert--danger {
            background: rgba(243, 100, 100, 0.1);
            border: 1px solid #F36464;
            color: #F36464;
        }
        .alert--success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid #34D399;
            color: #34D399;
        }
        .alert--info {
            background: rgba(45, 216, 196, 0.1);
            border: 1px solid #2DD8C4;
            color: #2DD8C4;
        }
        .resend-container {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #1E1E24;
        }
        .resend-prompt {
            color: #A3A3AE;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div th:fragment="empty-frag" hx-trigger="load" hx-redirect="/dashboard"></div>

<div th:fragment="error-alert" class="alert alert--danger" role="alert" th:text="${error}">
    An error occurred.
</div>

<div th:fragment="success-alert" class="alert alert--success" role="alert" th:text="${message}">
    Success!
</div>

<div th:fragment="resend-form" class="resend-container">
    <style th:replace="~{::auth-styles}"></style>
    <form hx-post="/auth/resend-confirmation" hx-target="#alert-container" hx-swap="innerHTML" class="form-block" style="display: flex; flex-direction: column; gap: 12px;">
        <p class="resend-prompt">Didn't get the link?</p>
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label for="resend-email" class="form-label">Enter email to resend</label>
            <input type="email" id="resend-email" class="input" name="email" placeholder="name@example.com" required/>
        </div>
        <button type="submit" class="btn btn--secondary" style="align-self: flex-start; padding: 8px 16px; font-size: 0.85rem;">Resend Confirmation</button>
    </form>
</div>

</body>
</html>
