<!--
  =============================================================================
  MODEL CONTRACT: Auth Fragments (`auth/fragments.html`)
  -----------------------------------------------------------------------------
  Required Model Attributes:
  - ${error}: String (optional error text)
  - ${message}: String (optional success text)
  =============================================================================
-->
<div th:fragment="empty-frag" hx-trigger="load" hx-redirect="/dashboard"></div>

<mark th:fragment="error-alert" role="alert" th:text="${error}">
    An error occurred during authentication.
</mark>

<ins th:fragment="success-alert" role="alert" th:text="${message}">
    Action completed successfully!
</ins>
