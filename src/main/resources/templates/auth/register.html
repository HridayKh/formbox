<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Account | Formbox</title>
    <!-- PicoCSS v2 Pumpkin Theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.pumpkin.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>
    <link rel="preconnect" href="https://challenges.cloudflare.com"/>
</head>
<body>

    <main class="container" style="max-width: 600px; padding-top: 3rem; padding-bottom: 3rem;">
        
        <p><a href="/">← Back to Home Page</a></p>

        <article>
            <header>
                <h2>Create a Formbox Account</h2>
                <p>Enter your details to create your form management account.</p>
            </header>

            <div id="alert-container" style="margin-bottom: 1.5rem;"></div>

            <form hx-post="/auth/signup" hx-target="#alert-container" hx-swap="innerHTML">
                <fieldset>
                    <label for="signup-email">
                        Email Address
                        <input type="email" id="signup-email" name="email" required autocomplete="email" placeholder="name@domain.com"/>
                    </label>

                    <label for="signup-password">
                        Password
                        <input type="password" id="signup-password" name="password" required autocomplete="new-password"/>
                    </label>
                </fieldset>

                <button type="submit" class="contrast" style="margin-top: 1rem;">Create Account</button>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAAD1xEDYqYOi7tGNB" style="margin-top: 1rem;"></div>
            </form>

            <footer style="margin-top: 2rem;">
                <p>Already have an account? <a href="/auth/login">Login here →</a></p>

                <details style="margin-top: 1rem;">
                    <summary>Didn't receive confirmation email?</summary>
                    <form hx-post="/auth/resend-confirmation" hx-target="#alert-container" hx-swap="innerHTML" style="margin-top: 1rem;">
                        <label for="resend-email">Enter your email</label>
                        <input type="email" id="resend-email" name="email" placeholder="name@domain.com" required/>
                        <button type="submit" class="secondary outline" style="margin-top: 0.5rem;">Resend Confirmation Link</button>
                    </form>
                </details>
            </footer>
        </article>

    </main>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
