<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Form — Formbox</title>
    <meta name="description" content="Configure your form endpoint settings and field schema."/>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet"/>
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

    <style>
        /* ════════════════════════════════════════════════════
           DESIGN TOKENS
        ════════════════════════════════════════════════════ */
        :root {
            --color-bg: #09090B;
            --color-bg-raised: #0E0E12;
            --color-surface: #121218;
            --color-surface-2: #16161D;
            --color-border: #1E1E24;
            --color-border-2: #27272A;
            --color-text: #F4F4F6;
            --color-text-dim: #A3A3AE;
            --color-text-faint: #6C6C77;
            --color-accent: #7C5CFC;
            --color-accent-bright: #9B7CFF;
            --color-accent-soft: rgba(124, 92, 252, 0.12);
            --color-teal: #2DD8C4;
            --color-teal-soft: rgba(45, 216, 196, 0.12);
            --color-danger: #F36464;
            --color-warning: #F2B84B;
            --color-success: #34D399;
            --gradient-accent: linear-gradient(135deg, #7C5CFC 0%, #5B3FE0 100%);
            --font-display: 'Inter', system-ui, -apple-system, sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 14px;
            --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.02) inset, 0 12px 32px -16px rgba(0, 0, 0, 0.6);
            --border: 1px solid var(--color-border);
            --border-2: 1px solid var(--color-border-2);
        }

        /* ════════════════════════════════════════════════════
           RESET & BASE
        ════════════════════════════════════════════════════ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        img, svg {
            display: block;
            max-width: 100%;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button, input, select, textarea {
            font-family: inherit;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        :focus-visible {
            outline: 2px solid var(--color-accent-bright);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ════════════════════════════════════════════════════
           LAYOUT
        ════════════════════════════════════════════════════ */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4) var(--space-6);
            background: rgba(9, 9, 11, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: var(--border);
        }

        .navbar__inner {
            max-width: 1200px;
            margin-inline: auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar__logo {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            text-decoration: none;
            color: var(--color-text);
        }

        .navbar__logo-mark {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            background: var(--gradient-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 1px rgba(124, 92, 252, 0.45), 0 0 16px rgba(124, 92, 252, 0.25);
        }

        .navbar__logo-mark svg {
            width: 16px;
            height: 16px;
            color: #fff;
        }

        .navbar__wordmark {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
        }

        .navbar__breadcrumb {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            font-size: 0.92rem;
            color: var(--color-text-dim);
            flex: 1;
            margin-left: var(--space-10);
        }

        .navbar__breadcrumb span {
            color: var(--color-text-faint);
        }

        .navbar__breadcrumb a {
            color: var(--color-accent-bright);
            transition: color 0.15s ease;
        }

        .navbar__breadcrumb a:hover {
            color: var(--color-accent);
        }

        .page-wrapper {
            max-width: 900px;
            margin-inline: auto;
            padding: var(--space-10) var(--space-6);
        }

        /* ════════════════════════════════════════════════════
           BREADCRUMB & HEADER
        ════════════════════════════════════════════════════ */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--color-accent-bright);
            text-decoration: none;
            font-size: 0.92rem;
            margin-bottom: var(--space-6);
            transition: color 0.15s ease;
        }

        .back-link:hover {
            color: var(--color-accent);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        .page-header {
            margin-bottom: var(--space-10);
        }

        .page-header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.02em;
            margin-bottom: var(--space-3);
        }

        .page-header p {
            color: var(--color-text-dim);
            font-size: 0.95rem;
        }

        .page-header code {
            font-family: var(--font-mono);
            background: var(--color-surface-2);
            border: var(--border-2);
            border-radius: var(--radius-sm);
            padding: 2px 8px;
            font-size: 0.85rem;
            color: var(--color-teal);
        }

        /* ════════════════════════════════════════════════════
           CARDS
        ════════════════════════════════════════════════════ */
        .card {
            background: var(--color-surface);
            border: var(--border-2);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            box-shadow: var(--shadow-card);
            margin-bottom: var(--space-10);
        }

        .card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-6);
            border-bottom: var(--border);
        }

        .card__title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.25rem;
            letter-spacing: -0.01em;
        }

        .card__subtitle {
            color: var(--color-text-dim);
            font-size: 0.9rem;
            margin-top: var(--space-2);
        }

        /* ════════════════════════════════════════════════════
           FORMS
        ════════════════════════════════════════════════════ */
        .form-block {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            margin-bottom: var(--space-5);
        }

        .form-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-text-faint);
        }

        .input, .textarea, .select {
            width: 100%;
            background: var(--color-bg-raised);
            color: var(--color-text);
            border: var(--border-2);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 0.92rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            appearance: none;
        }

        .input::placeholder, .textarea::placeholder {
            color: var(--color-text-faint);
        }

        .input:focus, .textarea:focus, .select:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.18);
        }

        .textarea {
            resize: vertical;
            min-height: 96px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-4) var(--space-4);
            background: var(--color-surface-2);
            border: var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .checkbox-group:hover {
            border-color: var(--color-accent);
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-accent);
        }

        .checkbox-group label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
        }

        /* ════════════════════════════════════════════════════
           BUTTONS
        ════════════════════════════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.92rem;
            padding: 11px 22px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        .btn--primary {
            background: var(--gradient-accent);
            color: #FFFFFF;
            box-shadow: 0 0 0 1px rgba(124, 92, 252, 0.45), 0 0 16px rgba(124, 92, 252, 0.25);
        }

        .btn--primary:hover {
            transform: translateY(-1px);
        }

        .btn--secondary {
            background: var(--color-surface-2);
            color: var(--color-text);
            border-color: var(--color-border-2);
        }

        .btn--secondary:hover {
            border-color: var(--color-accent);
            background: var(--color-surface);
        }

        .btn--sm {
            padding: 8px 16px;
            font-size: 0.82rem;
        }

        .btn--full {
            width: 100%;
        }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ════════════════════════════════════════════════════
           MESSAGES
        ════════════════════════════════════════════════════ */
        .alert {
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-5);
            font-size: 0.92rem;
        }

        .alert--success {
            background: rgba(52, 211, 153, 0.12);
            border: 1px solid rgba(52, 211, 153, 0.35);
            color: var(--color-success);
        }

        .alert--error {
            background: rgba(243, 100, 100, 0.12);
            border: 1px solid rgba(243, 100, 100, 0.35);
            color: var(--color-danger);
        }

        .alert p {
            margin: 0;
            font-weight: 500;
        }

        /* ════════════════════════════════════════════════════
           FIELD SCHEMA
        ════════════════════════════════════════════════════ */
        .field-row {
            display: flex;
            gap: var(--space-3);
            align-items: flex-start;
            padding: var(--space-4);
            background: var(--color-surface-2);
            border: var(--border-2);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-3);
            flex-wrap: wrap;
        }

        .field-row input, .field-row select {
            background: var(--color-bg-raised);
            color: var(--color-text);
            border: var(--border-2);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.85rem;
            flex: 1;
            min-width: 120px;
        }

        .field-row input:focus, .field-row select:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .field-action-btn {
            background: var(--color-accent-soft);
            color: var(--color-accent-bright);
            border: var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .field-action-btn:hover {
            background: var(--color-accent-soft);
            border-color: var(--color-accent);
        }

        .field-action-btn--delete {
            background: rgba(243, 100, 100, 0.12);
            color: var(--color-danger);
            border-color: rgba(243, 100, 100, 0.35);
        }

        .field-action-btn--delete:hover {
            background: rgba(243, 100, 100, 0.2);
        }

        .field-validation-panel {
            display: none;
            width: 100%;
            background: var(--color-bg-raised);
            border: var(--border-2);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-top: var(--space-3);
            flex-direction: column;
            gap: var(--space-3);
        }

        .field-validation-panel.active {
            display: flex;
        }

        .field-validation-panel label {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            font-size: 0.85rem;
            color: var(--color-text-dim);
        }

        .field-validation-panel input {
            background: var(--color-surface-2);
            color: var(--color-text);
            border: var(--border-2);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.82rem;
        }

        .empty-schema {
            text-align: center;
            padding: var(--space-10);
            color: var(--color-text-faint);
            font-style: italic;
        }

        /* ════════════════════════════════════════════════════
           FORM ACTIONS
        ════════════════════════════════════════════════════ */
        .form-actions {
            display: flex;
            gap: var(--space-3);
            justify-content: flex-start;
            padding-top: var(--space-6);
            border-top: var(--border);
        }

        .field-actions {
            display: flex;
            gap: var(--space-3);
            justify-content: space-between;
            align-items: center;
            margin-top: var(--space-6);
            padding-top: var(--space-6);
            border-top: var(--border);
        }

        /* ════════════════════════════════════════════════════
           UTILITIES
        ════════════════════════════════════════════════════ */
        .text-mono {
            font-family: var(--font-mono);
        }

        .text-dim {
            color: var(--color-text-dim);
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            white-space: nowrap;
        }

        .htmx-indicator {
            display: none;
        }

        .htmx-request .htmx-indicator {
            display: inline-flex;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ════════════════════════════════════════════════════
           RESPONSIVE
        ════════════════════════════════════════════════════ */
        @media (max-width: 720px) {
            .page-wrapper {
                padding: var(--space-6) var(--space-4);
            }

            .field-row {
                flex-direction: column;
            }

            .field-row input, .field-row select {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     NAVIGATION
════════════════════════════════════════════ -->
<header class="navbar">
    <div class="navbar__inner">
        <a href="/" class="navbar__logo">
      <span class="navbar__logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <path d="M4 6h16M4 12h10M4 18h16"/>
        </svg>
      </span>
            <span class="navbar__wordmark">Formbox</span>
        </a>
        <div class="navbar__breadcrumb">
            <a href="/dashboard">Dashboard</a>
            <span>/</span>
            <span>Manage Form</span>
        </div>
    </div>
</header>

<!-- ════════════════════════════════════════════
     PAGE CONTENT
════════════════════════════════════════════ -->
<div class="page-wrapper">

    <a href="/dashboard" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Dashboard
    </a>

    <!-- PAGE HEADER -->
    <div class="page-header" id="page-header">
        <h1 id="form-heading">Managing: Contact Form</h1>
        <p>
            Endpoint URL: <code>https://formbox.dev/f/8k2p9q</code>
        </p>
    </div>

    <!-- FORM SETTINGS CARD -->
    <div class="card" id="settings-panel-container">
        <div class="card__header">
            <div>
                <h2 class="card__title">Form Settings</h2>
                <p class="card__subtitle">Update endpoint configuration and webhooks</p>
            </div>
        </div>

        <div id="settings-message"></div>

        <form id="settings-form" hx-put="/forms/8k2p9q" hx-target="#settings-panel-container" hx-swap="outerHTML">
            <div class="form-block">
                <label class="form-label" for="form-name">Form Name</label>
                <input class="input" id="form-name" name="name" type="text" value="Contact Form" required/>
            </div>

            <div class="form-block">
                <label class="form-label" for="form-redirect">Custom Redirect URL (Optional)</label>
                <input class="input" id="form-redirect" name="redirectUrl" type="url"
                       placeholder="https://yoursite.com/thank-you" value="https://usepilot.dev/thank-you"/>
            </div>

            <div class="form-block">
                <label class="form-label" for="form-discord">Discord Webhook (Optional)</label>
                <input class="input" id="form-discord" name="discordWebhook" type="url"
                       placeholder="https://discord.com/api/webhooks/..."/>
            </div>

            <label class="checkbox-group">
                <input type="checkbox" id="form-active" name="isActive" checked/>
                <label for="form-active" style="margin: 0;">Form is currently active</label>
            </label>

            <div class="form-actions">
                <button class="btn btn--primary" type="submit">
                    <span class="btn-label">Save Settings</span>
                    <span class="spinner htmx-indicator"></span>
                </button>
            </div>
        </form>
    </div>

    <!-- FIELD SCHEMA CARD -->
    <div class="card" id="fields-panel-container">
        <div class="card__header">
            <div>
                <h2 class="card__title">Field Schema</h2>
                <p class="card__subtitle">Define which fields your form accepts and their validation rules</p>
            </div>
        </div>

        <div id="schema-message"></div>

        <div id="fields-list" style="margin-bottom: var(--space-6);">
            <!-- Field rows will be dynamically added here -->
            <div class="field-row">
                <input type="text" placeholder="Field Name (key)" class="f-name" value="email" required/>
                <input type="text" placeholder="Human Label" class="f-label" value="Email Address" required/>
                <select class="f-type">
                    <option value="text">text</option>
                    <option value="email" selected>email</option>
                    <option value="number">number</option>
                    <option value="textarea">textarea</option>
                    <option value="checkbox">checkbox</option>
                    <option value="radio">radio</option>
                    <option value="select">select</option>
                    <option value="tel">tel</option>
                    <option value="url">url</option>
                    <option value="date">date</option>
                    <option value="file">file</option>
                </select>
                <label style="display: flex; align-items: center; gap: var(--space-2); font-size: 0.85rem;">
                    <input type="checkbox" class="f-req" checked/>
                    Required
                </label>
                <button type="button" class="field-action-btn f-validate-btn">⚙ Validation</button>
                <button type="button" class="field-action-btn field-action-btn--delete"
                        onclick="this.closest('.field-row').remove()">Delete
                </button>
                <div class="field-validation-panel">
                    <label>
                        Min Length
                        <input type="number" class="f-min-length"/>
                    </label>
                    <label>
                        Max Length
                        <input type="number" class="f-max-length"/>
                    </label>
                    <label>
                        Regex Pattern
                        <input type="text" class="f-pattern" placeholder="e.g., ^[A-Z].*"/>
                    </label>
                    <label>
                        Options (comma-separated)
                        <input type="text" class="f-options" placeholder="opt1, opt2, opt3"/>
                    </label>
                    <button type="button" class="f-close-validation btn btn--secondary btn--sm"
                            style="align-self: flex-end;">Done
                    </button>
                </div>
            </div>

            <div class="field-row">
                <input type="text" placeholder="Field Name (key)" class="f-name" value="message" required/>
                <input type="text" placeholder="Human Label" class="f-label" value="Message" required/>
                <select class="f-type">
                    <option value="text">text</option>
                    <option value="email">email</option>
                    <option value="number">number</option>
                    <option value="textarea" selected>textarea</option>
                    <option value="checkbox">checkbox</option>
                    <option value="radio">radio</option>
                    <option value="select">select</option>
                    <option value="tel">tel</option>
                    <option value="url">url</option>
                    <option value="date">date</option>
                    <option value="file">file</option>
                </select>
                <label style="display: flex; align-items: center; gap: var(--space-2); font-size: 0.85rem;">
                    <input type="checkbox" class="f-req" checked/>
                    Required
                </label>
                <button type="button" class="field-action-btn f-validate-btn">⚙ Validation</button>
                <button type="button" class="field-action-btn field-action-btn--delete"
                        onclick="this.closest('.field-row').remove()">Delete
                </button>
                <div class="field-validation-panel">
                    <label>
                        Min Length
                        <input type="number" class="f-min-length" value="10"/>
                    </label>
                    <label>
                        Max Length
                        <input type="number" class="f-max-length" value="1000"/>
                    </label>
                    <label>
                        Regex Pattern
                        <input type="text" class="f-pattern"/>
                    </label>
                    <label>
                        Options (comma-separated)
                        <input type="text" class="f-options"/>
                    </label>
                    <button type="button" class="f-close-validation btn btn--secondary btn--sm"
                            style="align-self: flex-end;">Done
                    </button>
                </div>
            </div>
        </div>

        <div class="field-actions">
            <button type="button" class="btn btn--secondary" id="add-field-btn" onclick="addNewFieldRow()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add Field
            </button>
            <button type="button" class="btn btn--primary" id="save-fields-btn" onclick="submitFieldsForm()">
                <span class="btn-label">Save Schema</span>
                <span class="spinner htmx-indicator"></span>
            </button>
        </div>
    </div>

</div>

<script>
    // ──────────────────────────────────────────
    // Field Schema Management
    // ──────────────────────────────────────────

    function attachValidationHandlers(row) {
        const validateBtn = row.querySelector('.f-validate-btn');
        const validationPanel = row.querySelector('.field-validation-panel');
        const closeBtn = row.querySelector('.f-close-validation');

        if (validateBtn) {
            validateBtn.addEventListener('click', (e) => {
                e.preventDefault();
                validationPanel.classList.toggle('active');
            });
        }

        if (closeBtn) {
            closeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                validationPanel.classList.remove('active');
            });
        }
    }

    window.addNewFieldRow = function addNewFieldRow() {
        const container = document.getElementById('fields-list');
        const row = document.createElement('div');
        row.className = 'field-row';

        row.innerHTML = `
      <input type="text" placeholder="Field Name (key)" class="f-name" required />
      <input type="text" placeholder="Human Label" class="f-label" required />
      <select class="f-type">
        <option value="text">text</option>
        <option value="email">email</option>
        <option value="number">number</option>
        <option value="textarea">textarea</option>
        <option value="checkbox">checkbox</option>
        <option value="radio">radio</option>
        <option value="select">select</option>
        <option value="tel">tel</option>
        <option value="url">url</option>
        <option value="date">date</option>
        <option value="file">file</option>
      </select>
      <label style="display: flex; align-items: center; gap: var(--space-2); font-size: 0.85rem;">
        <input type="checkbox" class="f-req" />
        Required
      </label>
      <button type="button" class="field-action-btn f-validate-btn">⚙ Validation</button>
      <button type="button" class="field-action-btn field-action-btn--delete" onclick="this.closest('.field-row').remove()">Delete</button>
      <div class="field-validation-panel">
        <label>
          Min Length
          <input type="number" class="f-min-length" />
        </label>
        <label>
          Max Length
          <input type="number" class="f-max-length" />
        </label>
        <label>
          Regex Pattern
          <input type="text" class="f-pattern" placeholder="e.g., ^[A-Z].*" />
        </label>
        <label>
          Options (comma-separated)
          <input type="text" class="f-options" placeholder="opt1, opt2, opt3" />
        </label>
        <button type="button" class="f-close-validation btn btn--secondary btn--sm" style="align-self: flex-end;">Done</button>
      </div>
    `;

        container.appendChild(row);
        attachValidationHandlers(row);
    };

    // Initialize validation handlers on page load
    document.querySelectorAll('.field-row').forEach(row => {
        attachValidationHandlers(row);
    });

    window.submitFieldsForm = async function submitFieldsForm() {
        const saveBtn = document.getElementById('save-fields-btn');
        const messageDiv = document.getElementById('schema-message');
        const rows = document.querySelectorAll('#fields-list .field-row');

        messageDiv.innerHTML = '';

        if (rows.length === 0) {
            messageDiv.innerHTML = '<div class="alert alert--error"><p>Add at least one field before saving.</p></div>';
            return;
        }

        const payload = [];

        for (const row of rows) {
            const nameInput = row.querySelector('.f-name');
            const labelInput = row.querySelector('.f-label');
            const typeInput = row.querySelector('.f-type');
            const reqInput = row.querySelector('.f-req');
            const minLengthInput = row.querySelector('.f-min-length');
            const maxLengthInput = row.querySelector('.f-max-length');
            const patternInput = row.querySelector('.f-pattern');
            const optionsInput = row.querySelector('.f-options');

            const name = nameInput?.value?.trim() || '';
            const label = labelInput?.value?.trim() || '';

            if (!name || !label) {
                messageDiv.innerHTML = '<div class="alert alert--error"><p>Every field needs both a Field Name and a Human Label.</p></div>';
                return;
            }

            let validation = null;
            const minLength = minLengthInput?.value ? parseInt(minLengthInput.value, 10) : null;
            const maxLength = maxLengthInput?.value ? parseInt(maxLengthInput.value, 10) : null;
            const pattern = patternInput?.value?.trim() || null;

            if (minLength || maxLength || pattern) {
                validation = {};
                if (minLength) validation.min_length = minLength;
                if (maxLength) validation.max_length = maxLength;
                if (pattern) validation.pattern = pattern;
            }

            let options = null;
            const optionsText = optionsInput?.value?.trim();
            if (optionsText) {
                options = optionsText.split(',').map(opt => opt.trim()).filter(opt => opt.length > 0);
                if (options.length === 0) options = null;
            }

            payload.push({
                name: name,
                label: label,
                type: typeInput?.value || 'text',
                required: reqInput?.checked || false,
                validation: validation,
                options: options
            });
        }

        saveBtn.disabled = true;

        try {
            const resp = await fetch('/forms/8k2p9q/fields', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                messageDiv.innerHTML = '<div class="alert alert--success"><p>Field schema saved successfully!</p></div>';
            } else {
                const errorText = await resp.text();
                messageDiv.innerHTML = `<div class="alert alert--error"><p>Save failed (${resp.status}). ${errorText || ''}</p></div>`;
            }
        } catch (err) {
            messageDiv.innerHTML = `<div class="alert alert--error"><p>Network error: ${err.message}</p></div>`;
        } finally {
            saveBtn.disabled = false;
        }
    };

    // ──────────────────────────────────────────
    // Settings Form HTMX
    // ──────────────────────────────────────────
    document.getElementById('settings-form').addEventListener('htmx:responseError', function () {
        const msgDiv = document.getElementById('settings-message');
        msgDiv.innerHTML = '<div class="alert alert--error"><p>Failed to save form settings.</p></div>';
    });

    document.getElementById('settings-form').addEventListener('htmx:afterSwap', function () {
        const msgDiv = document.getElementById('settings-message');
        msgDiv.innerHTML = '<div class="alert alert--success"><p>Form settings saved successfully!</p></div>';
    });
</script>

</body>
</html>
