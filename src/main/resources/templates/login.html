<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<div th:if="${param.msg != null}">
    <p th:if="${param.msg[0] == 'logged_out'}" style="color: green;">You have been logged out successfully.</p>
    <p th:if="${param.msg[0] == 'check_email'}" style="color: blue;">Please check your email to confirm
        registration.</p>
</div>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<form th:action="@{/login}" method="post">
    <label>
        <input type="email" name="email" placeholder="Email" required>
    </label>
    <label>
        <input type="password" name="password" placeholder="Password" required>
    </label>
    <button type="submit">Login</button>
</form>

<form th:action="@{/resend-confirmation}" method="post">
    <label>
        <input type="email" name="email" placeholder="Email for resend" required>
    </label>
    <button type="submit">Resend Confirmation Email</button>
</form>
</body>
</html>
