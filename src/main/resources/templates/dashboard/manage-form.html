<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Form | FormBox</title>
    <meta name="description" content="Configure your form endpoint settings and field schema."/>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>

    <style>
        /* ════════════════════════════════════════════════════
           DESIGN TOKENS
        ════════════════════════════════════════════════════ */
        :root {
            --color-bg: #09090B;
            --color-bg-raised: #0E0E12;
            --color-surface: #121218;
            --color-surface-2: #16161D;
            --color-border: #1E1E24;
            --color-border-2: #27272A;
            --color-text: #F4F4F6;
            --color-text-dim: #A3A3AE;
            --color-text-faint: #6C6C77;
            --color-accent: #7C5CFC;
            --color-accent-bright: #9B7CFF;
            --color-accent-soft: rgba(124, 92, 252, 0.12);
            --color-teal: #2DD8C4;
            --color-teal-soft: rgba(45, 216, 196, 0.12);
            --color-danger: #F36464;
            --color-warning: #F2B84B;
            --color-success: #34D399;
            --gradient-accent: linear-gradient(135deg, #7C5CFC 0%, #5B3FE0 100%);
            --font-display: 'Inter', system-ui, -apple-system, sans-serif;
            --font-body: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 14px;
            --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.02) inset, 0 12px 32px -16px rgba(0, 0, 0, 0.6);
            --border: 1px solid var(--color-border);
            --border-2: 1px solid var(--color-border-2);
        }

        /* ════════════════════════════════════════════════════
           RESET & BASE
        ════════════════════════════════════════════════════ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        img, svg {
            display: block;
            max-width: 100%;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button, input, select, textarea {
            font-family: inherit;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        :focus-visible {
            outline: 2px solid var(--color-accent-bright);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ════════════════════════════════════════════════════
           LAYOUT
        ════════════════════════════════════════════════════ */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4) var(--space-6);
            background: rgba(9, 9, 11, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: var(--border);
        }

        .navbar__inner {
            max-width: 900px;
            margin-inline: auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar__logo {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            text-decoration: none;
            color: var(--color-text);
        }

        .navbar__logo-mark {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            background: var(--gradient-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 1px rgba(124, 92, 252, 0.45), 0 0 16px rgba(124, 92, 252, 0.25);
        }

        .navbar__logo-mark svg {
            width: 16px;
            height: 16px;
            color: #fff;
        }

        .navbar__wordmark {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
        }

        .navbar__breadcrumb {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            font-size: 0.92rem;
            color: var(--color-text-dim);
            flex: 1;
            margin-left: var(--space-10);
        }

        .navbar__breadcrumb span {
            color: var(--color-text-faint);
        }

        .navbar__breadcrumb a {
            color: var(--color-accent-bright);
            transition: color 0.15s ease;
        }

        .navbar__breadcrumb a:hover {
            color: var(--color-accent);
        }

        .page-wrapper {
            max-width: 900px;
            margin-inline: auto;
            padding: var(--space-10) var(--space-6);
        }

        /* ════════════════════════════════════════════════════
           BREADCRUMB & HEADER
        ════════════════════════════════════════════════════ */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--color-accent-bright);
            text-decoration: none;
            font-size: 0.92rem;
            margin-bottom: var(--space-6);
            transition: color 0.15s ease;
        }

        .back-link:hover {
            color: var(--color-accent);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        .page-header {
            margin-bottom: var(--space-10);
        }

        .page-header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.02em;
            margin-bottom: var(--space-3);
        }

        .page-header p {
            color: var(--color-text-dim);
            font-size: 0.95rem;
        }

        .page-header code {
            font-family: var(--font-mono);
            background: var(--color-surface-2);
            border: var(--border-2);
            border-radius: var(--radius-sm);
            padding: 2px 8px;
            font-size: 0.85rem;
            color: var(--color-teal);
        }

        /* ════════════════════════════════════════════════════
           CARDS
        ════════════════════════════════════════════════════ */
        .card {
            background: var(--color-surface);
            border: var(--border-2);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            box-shadow: var(--shadow-card);
            margin-bottom: var(--space-10);
        }

        .card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-6);
            border-bottom: var(--border);
        }

        .card__title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.25rem;
            letter-spacing: -0.01em;
        }

        .card__subtitle {
            color: var(--color-text-dim);
            font-size: 0.9rem;
            margin-top: var(--space-2);
        }

        /* ════════════════════════════════════════════════════
           FORMS
        ════════════════════════════════════════════════════ */
        .form-block {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            margin-bottom: var(--space-5);
        }

        .form-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-text-faint);
        }

        .input, .textarea, .select {
            width: 100%;
            background: var(--color-bg-raised);
            color: var(--color-text);
            border: var(--border-2);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 0.92rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            appearance: none;
        }

        .input::placeholder, .textarea::placeholder {
            color: var(--color-text-faint);
        }

        .input:focus, .textarea:focus, .select:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.18);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-4) var(--space-4);
            background: var(--color-surface-2);
            border: var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: border-color 0.15s ease;
            margin-bottom: var(--space-5);
        }

        .checkbox-group:hover {
            border-color: var(--color-accent);
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-accent);
        }

        .checkbox-group label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
        }

        /* ════════════════════════════════════════════════════
           BUTTONS
        ════════════════════════════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.92rem;
            padding: 11px 22px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        .btn--primary {
            background: var(--gradient-accent);
            color: #FFFFFF;
            box-shadow: 0 0 0 1px rgba(124, 92, 252, 0.45), 0 0 16px rgba(124, 92, 252, 0.25);
        }

        .btn--primary:hover {
            transform: translateY(-1px);
        }

        .btn--secondary {
            background: var(--color-surface-2);
            color: var(--color-text);
            border-color: var(--color-border-2);
        }

        .btn--secondary:hover {
            border-color: var(--color-accent);
            background: var(--color-surface);
        }

        .btn--sm {
            padding: 8px 16px;
            font-size: 0.82rem;
        }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ════════════════════════════════════════════════════
           MESSAGES
        ════════════════════════════════════════════════════ */
        .alert {
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-5);
            font-size: 0.92rem;
        }

        .alert--success {
            background: rgba(52, 211, 153, 0.12);
            border: 1px solid rgba(52, 211, 153, 0.35);
            color: var(--color-success);
        }

        .alert--error {
            background: rgba(243, 100, 100, 0.12);
            border: 1px solid rgba(243, 100, 100, 0.35);
            color: var(--color-danger);
        }

        .alert p {
            margin: 0;
            font-weight: 500;
        }

        /* ════════════════════════════════════════════════════
           FIELD SCHEMA
        ════════════════════════════════════════════════════ */
        .field-row {
            display: flex;
            gap: var(--space-3);
            align-items: center;
            padding: var(--space-4);
            background: var(--color-surface-2);
            border: var(--border-2);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-3);
            flex-wrap: wrap;
        }

        .field-row input, .field-row select {
            background: var(--color-bg-raised);
            color: var(--color-text);
            border: var(--border-2);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.85rem;
            flex: 1;
            min-width: 120px;
        }

        .field-row input:focus, .field-row select:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .field-action-btn {
            background: var(--color-accent-soft);
            color: var(--color-accent-bright);
            border: var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .field-action-btn:hover {
            background: var(--color-accent-soft);
            border-color: var(--color-accent);
        }

        .field-action-btn--delete {
            background: rgba(243, 100, 100, 0.12);
            color: var(--color-danger);
            border-color: rgba(243, 100, 100, 0.35);
        }

        .field-action-btn--delete:hover {
            background: rgba(243, 100, 100, 0.2);
        }

        .field-validation-panel {
            display: none;
            width: 100%;
            background: var(--color-bg-raised);
            border: var(--border-2);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-top: var(--space-3);
            flex-direction: column;
            gap: var(--space-3);
        }

        .field-validation-panel.active {
            display: flex;
        }

        .field-validation-panel label {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            font-size: 0.85rem;
            color: var(--color-text-dim);
        }

        .field-validation-panel input {
            background: var(--color-surface-2);
            color: var(--color-text);
            border: var(--border-2);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.82rem;
        }

        .empty-schema {
            text-align: center;
            padding: var(--space-10);
            color: var(--color-text-faint);
            font-style: italic;
            width: 100%;
        }

        /* ════════════════════════════════════════════════════
           FORM ACTIONS
        ════════════════════════════════════════════════════ */
        .form-actions {
            display: flex;
            gap: var(--space-3);
            justify-content: flex-start;
            padding-top: var(--space-6);
            border-top: var(--border);
        }

        .field-actions {
            display: flex;
            gap: var(--space-3);
            justify-content: space-between;
            align-items: center;
            margin-top: var(--space-6);
            padding-top: var(--space-6);
            border-top: var(--border);
        }

        /* ════════════════════════════════════════════════════
           UTILITIES
        ════════════════════════════════════════════════════ */
        .htmx-indicator {
            display: none;
        }

        .htmx-request .htmx-indicator {
            display: inline-flex;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ════════════════════════════════════════════════════
           RESPONSIVE
        ════════════════════════════════════════════════════ */
        @media (max-width: 720px) {
            .page-wrapper {
                padding: var(--space-6) var(--space-4);
            }

            .field-row {
                flex-direction: column;
                align-items: stretch;
            }

            .field-row input, .field-row select {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="navbar__inner">
        <a href="/" class="navbar__logo">
            <span class="navbar__logo-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M4 6h16M4 12h10M4 18h16"/>
                </svg>
            </span>
            <span class="navbar__wordmark">Formbox</span>
        </a>
        <div class="navbar__breadcrumb">
            <a href="/dashboard">Dashboard</a>
            <span>/</span>
            <span>Manage Form</span>
        </div>
    </div>
</header>

<div class="page-wrapper">

    <a href="/dashboard" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Dashboard
    </a>

    <div class="page-header" id="page-header">
        <h1 id="form-heading" th:text="'Managing: ' + ${form.name}">Managing Form Name</h1>
        <p>
            Endpoint URL: <code th:text="'/f/' + ${form.id}">/f/uuid</code>
        </p>
    </div>

    <div id="settings-panel-container">
        <div th:fragment="settings-panel" class="card">

            <h1 id="form-heading-settings" hx-swap-oob="true" th:text="'Managing: ' + ${form.name}" style="display: none;">
                Managing Form Name</h1>

            <div class="card__header">
                <div>
                    <h2 class="card__title">Form Settings</h2>
                    <p class="card__subtitle">Update endpoint configuration and webhooks</p>
                </div>
            </div>

            <div th:if="${message}" class="alert alert--success">
                <p th:text="${message}">Saved!</p>
            </div>

            <form th:attr="hx-put=|/forms/${form.id}|" hx-target="#settings-panel-container" hx-swap="innerHTML">

                <div class="form-block">
                    <label class="form-label">Form Name</label>
                    <input class="input" type="text" name="name" th:value="${form.name}" required/>
                </div>

                <div class="form-block">
                    <label class="form-label">Custom Redirect URL (Optional)</label>
                    <input class="input" type="url" name="redirectUrl" th:value="${form.redirectUrl}"
                           placeholder="https://your-site.com/thanks"/>
                </div>

                <div class="form-block">
                    <label class="form-label">Discord Webhook (Optional — Coming Soon)</label>
                    <input class="input" type="url" placeholder="https://discord.com/api/webhooks/..." disabled
                           style="opacity: 0.5; cursor: not-allowed;"/>
                </div>

                <label class="checkbox-group" for="isActive">
                    <input type="checkbox" id="isActive" name="isActive" value="true" th:checked="${form.isActive}"/>
                    <label for="isActive" style="margin: 0;">Form is currently active</label>
                </label>

                <div class="form-actions">
                    <button class="btn btn--primary" type="submit">
                        <span class="btn-label">Save Configurations</span>
                        <span class="spinner htmx-indicator"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
